# ═══════════════════════════════════════════════════════════
# Nginx config for Ecove Marketplace — Production
# VPS-optimised: gzip, keepalive, correct caching, security
# ═══════════════════════════════════════════════════════════

# Upstream definition with keepalive — reuses TCP connections to Node.js
# instead of opening a new connection per request (saves ~2ms per request)
upstream ecove_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ecove.com.ng www.ecove.com.ng;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ecove.com.ng www.ecove.com.ng;

    # SSL — Certbot fills these in automatically
    ssl_certificate     /etc/letsencrypt/live/ecove.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ecove.com.ng/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression — reduces response size by 60-80% for HTML/JSON/CSS/JS
    # Critical on Nigerian mobile connections
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml;

    # Logs
    access_log /var/log/nginx/ecove.access.log;
    error_log  /var/log/nginx/ecove.error.log warn;

    # File upload limit (product images)
    client_max_body_size 20M;

    # Timeouts — match proxy_read_timeout
    client_header_timeout 10s;
    client_body_timeout   30s;
    send_timeout          30s;

    # Next.js static assets — immutable, cache 1 year in browser
    # No proxy_cache_valid needed — Cache-Control header does the work
    location /_next/static/ {
        proxy_pass http://ecove_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Public folder assets — cache 24 hours
    location /public/ {
        proxy_pass http://ecove_app;
        add_header Cache-Control "public, max-age=86400";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Webhook endpoints — longer timeout, no buffering
    location /api/webhooks/ {
        proxy_pass         http://ecove_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        # Disable request buffering — webhooks need the body immediately
        proxy_request_buffering off;
    }

    # Everything else
    location / {
        proxy_pass         http://ecove_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Return 502 quickly if Node.js is down — fail fast
        proxy_next_upstream error timeout http_502 http_503;
    }
}
